# Project information
site_name: MY-CO2Laser
site_url: "https://my-machines.net/MY-CO2Laser/"
site_author: "Edgar Mata"
site_description: "My Machines knowledge base"

# Repository
repo_name: "MY-CO2Laser-CNC"
repo_url: "https://github.com/EdgarMata/MY-CO2Laser-CNC"

# Copyright
copyright: '&copy; 2022 - <span id="current-year"></span> <a href="https://my-machines.net/" target="_blank" rel="noopener">My Machines</a> by Edgar Mata'

# Configuration
theme:
  name: material
  language: pt
  logo: assets/mylogo.svg
  favicon: images/f-icon.png
  features:
    - navigation.tabs
    - navigation.path
    - navigation.expand
    - navigation.footer 
    - toc.follow  
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - header.autohide  

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: System Preferences
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: light blue
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to Light mode
      primary: light blue
      accent: indigo

  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16     

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/EdgarMata
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/machines.net/
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/machines_net/
    - icon: fontawesome/brands/pinterest
      link: https://pt.pinterest.com/machines_net
    - icon: fontawesome/brands/tiktok
      link: https://www.tiktok.com/@machines_net
    - icon: fontawesome/solid/paper-plane
      link: mailto:geral@my-machines.net
  analytics:
    provider: google
    property: G-B2Y6R89EJ9
    feedback:
      title: Did this page help?
      ratings:
        - icon: material/thumb-up-outline
          name: Did this page help
          data: 1
          note: "Thanks for the feedback!"
        - icon: material/thumb-down-outline
          name: This page can be improved
          data: 0
          note: "Thanks for the feedback! Help us improve this page using our feedback form."

# --- CSS PERSONALIZADO PARA ANIMAÇÕES ---
extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details  
  - pymdownx.mark
  - attr_list      # Necessário para classes CSS nas imagens e botões
  - md_in_html     # Necessário para usar <div> e <img> no markdown
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - toc:
      permalink: true
      title: Table of Contents

